<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>KAIXA Phone</title>
<style>
  :root{
    --ui: url('assets/ui.jpg');

    --bg:#000;
    --fg:#fff;

    /* ===== 每个按钮单独控制：left / top / width / height ===== */

    /* ENTER */
    --btn-enter-left: 27.4%;
    --btn-enter-top:  53.1%;
    --btn-enter-w:    29.4%;
    --btn-enter-h:    4.9%;

    /* 第二行 */
    --btn-ring-left:  26%;
    --btn-ring-top:   59.7%;
    --btn-ring-w:     14%;
    --btn-ring-h:     4.15%;

    --btn-clear-left: 42%;
    --btn-clear-top:  60.8%;
    --btn-clear-w:    15%;
    --btn-clear-h:    4.15%;

    --btn-stop-left:  59%;
    --btn-stop-top:   59.7%;
    --btn-stop-w:     13.1%;
    --btn-stop-h:     4.15%;

    /* 数字区 */
    --btn-1-left:     26%;
    --btn-1-top:      65%;
    --btn-1-w:        14%;
    --btn-1-h:        4.15%;

    --btn-2-left:     42%;
    --btn-2-top:      66%;
    --btn-2-w:        15%;
    --btn-2-h:        4.15%;

    --btn-3-left:     59%;
    --btn-3-top:      65%;
    --btn-3-w:        13.1%;
    --btn-3-h:        4.15%;

    --btn-4-left:     26%;
    --btn-4-top:      70.5%;
    --btn-4-w:        14%;
    --btn-4-h:        4.15%;

    --btn-5-left:     42%;
    --btn-5-top:      71%;
    --btn-5-w:        15%;
    --btn-5-h:        4.15%;

    --btn-6-left:     59%;
    --btn-6-top:      70.5%;
    --btn-6-w:        13.1%;
    --btn-6-h:        4.15%;

    --btn-7-left:     26%;
    --btn-7-top:      75.7%;
    --btn-7-w:        14%;
    --btn-7-h:        4.15%;

    --btn-8-left:     42%;
    --btn-8-top:      76%;
    --btn-8-w:        15%;
    --btn-8-h:        4.15%;

    --btn-9-left:     59%;
    --btn-9-top:      75.7%;
    --btn-9-w:        13.1%;
    --btn-9-h:        4.15%;

    --btn-star-left:  26%;
    --btn-star-top:   81%;
    --btn-star-w:     13.1%;
    --btn-star-h:     4.15%;

    --btn-0-left:     42%;
    --btn-0-top:      82%;
    --btn-0-w:        15%;
    --btn-0-h:        4.15%;

    --btn-hash-left:  59%;
    --btn-hash-top:   81%;
    --btn-hash-w:     13.1%;
    --btn-hash-h:     4.15%;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent }
  html,body{ height:100%; margin:0; background:var(--bg); color:var(--fg); }
  body{ display:flex; justify-content:center; }
  .wrap{ width:min(94vw, 520px); margin:12px auto 48px; }

  .phone{ position:relative; width:100%; }
  .phone img{ width:100%; height:auto; display:block; user-select:none; pointer-events:none; }

  .hit{
    position:absolute;
    outline:none;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
    transform-origin:center;
    cursor:pointer;

    /* 调试显示 */
    background:rgba(255,0,0,.22);
    border:1.5px dashed #00ffff;
    border-radius:8px;
  }
  .hit:active{ transform:scale(.98); }

  .hit::after{
    content: attr(aria-label);
    position:absolute;
    left:4px;
    top:2px;
    font:600 10px/1 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color:#00ffff;
    text-shadow:0 0 3px #000;
    pointer-events:none;
  }

  .hit.selected{
    border:2px solid #ffe600;
    box-shadow:0 0 0 2px rgba(0,0,0,.55) inset, 0 0 10px rgba(255,230,0,.7);
  }

  .tip{
    width:min(94vw, 520px);
    margin:6px auto 0;
    padding:8px 10px;
    color:#d9e8ff;
    font:12px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    opacity:.92;
  }

  .boot-lock{
    position:fixed;
    inset:0;
    z-index:9999;
    background:transparent;
    cursor:pointer;
  }

  .hidden-audio{
    display:none;
  }
</style>
</head>
<body>
  <div>
    <div class="wrap">
      <div class="phone" id="phone">
        <img src="assets/ui.jpg" alt="KAIXA UI" id="ui"/>

        <button class="hit" id="btnEnter" aria-label="ENTER" data-btn="enter"></button>

        <button class="hit" id="btnRing"  aria-label="铃声"   data-btn="ring"></button>
        <button class="hit" id="btnClear" aria-label="クリア" data-btn="clear"></button>
        <button class="hit" id="btnStop"  aria-label="停止"   data-btn="stop"></button>

        <button class="hit" data-k="1" aria-label="1" data-btn="1"></button>
        <button class="hit" data-k="2" aria-label="2" data-btn="2"></button>
        <button class="hit" data-k="3" aria-label="3" data-btn="3"></button>

        <button class="hit" data-k="4" aria-label="4" data-btn="4"></button>
        <button class="hit" data-k="5" aria-label="5" data-btn="5"></button>
        <button class="hit" data-k="6" aria-label="6" data-btn="6"></button>

        <button class="hit" data-k="7" aria-label="7" data-btn="7"></button>
        <button class="hit" data-k="8" aria-label="8" data-btn="8"></button>
        <button class="hit" data-k="9" aria-label="9" data-btn="9"></button>

        <button class="hit" data-k="*" aria-label="*" data-btn="star"></button>
        <button class="hit" data-k="0" aria-label="0" data-btn="0"></button>
        <button class="hit" data-k="#" aria-label="#" data-btn="hash"></button>
      </div>
    </div>

    <div class="tip">
      首次点击屏幕任意位置只会播放 open phone，播完且关键音效预热完成后才开放其他交互。<br>
      这版是按 iPhone Safari 的规则写的。<br>
      点击任意按钮可选中。方向键移动，Alt + 方向键微调，[ / ] 调宽，- / = 调高，P 输出当前参数。
    </div>
  </div>

  <div class="boot-lock" id="bootLock" aria-hidden="true"></div>
  <audio id="bootAudio" class="hidden-audio" preload="auto" playsinline webkit-playsinline src="assets/open phone.m4a"></audio>

<script>
(() => {
  const AUDIO_URLS = {
    openPhone:  'assets/open phone.m4a',
    ring:       'assets/ring.m4a',
    enter:      'assets/enter.m4a',
    key1:       'assets/key1.m4a',
    key3:       'assets/key3.m4a',
    key9:       'assets/key9.m4a',
    standBy:    'assets/stand by.m4a',
    complete:   'assets/complete.m4a',
    error:      'assets/error.m4a',
    ready:      'assets/ready.m4a',
    exceed:     'assets/exceed charge.m4a',
    release:    'assets/release.m4a',
    weaponHit:  'assets/weaponHit.m4a'
  };

  const TRANSFORM_CODE = '913';

  let buf = '';
  let transformed = false;
  let armed = false;
  let readyOnce = false;
  let ringNode = null;
  let standNode = null;

  let booting = true;
  let bootPlayed = false;
  let bootEnded = false;
  let warmupDone = false;

  const bootLock = document.getElementById('bootLock');
  const bootAudio = document.getElementById('bootAudio');

  let ac = null;
  let master = null;
  const buffers = new Map();
  const fetchPromises = new Map();

  function ctx(){
    if(ac) return ac;
    const C = window.AudioContext || window.webkitAudioContext;
    ac = new C({ latencyHint: 'interactive' });
    master = ac.createGain();
    master.gain.value = 1;
    master.connect(ac.destination);
    return ac;
  }

  async function ensureAudioReady(){
    const c = ctx();
    if(c.state === 'suspended'){
      await c.resume();
    }
    return c;
  }

  function primeFetch(key){
    if(fetchPromises.has(key)) return fetchPromises.get(key);
    const url = AUDIO_URLS[key];
    const p = fetch(url, { cache:'force-cache' })
      .then(res => {
        if(!res.ok) throw new Error(`fetch ${res.status}: ${key}`);
        return res.arrayBuffer();
      });
    fetchPromises.set(key, p);
    return p;
  }

  async function loadBuffer(key){
    if(buffers.has(key)) return buffers.get(key);
    const arr = await primeFetch(key);
    const buf = await ctx().decodeAudioData(arr.slice(0));
    buffers.set(key, buf);
    return buf;
  }

  async function preloadKeys(keys){
    await Promise.all(keys.map(async key => {
      try{
        await loadBuffer(key);
      }catch(err){
        console.error('[audio preload failed]', key, err);
      }
    }));
  }

  function playBuffer(key, { loop = false, onended = null } = {}){
    const buf = buffers.get(key);
    if(!buf){
      console.warn('[playBuffer] missing:', key);
      return null;
    }

    const s = ctx().createBufferSource();
    s.buffer = buf;
    s.loop = !!loop;
    s.connect(master);

    if(onended){
      s.onended = onended;
    }

    s.start(0);
    return s;
  }

  function stopNode(node){
    if(!node) return;
    try{ node.stop(0); }catch{}
  }

  function interruptRing(){
    if(ringNode){
      stopNode(ringNode);
      ringNode = null;
    }
  }

  function maybeFinishBoot(){
    if(!booting) return;
    if(!(bootEnded && warmupDone)) return;
    booting = false;
    bootLock.style.display = 'none';
  }

  async function warmupCritical(){
    await preloadKeys([
      'key1','key3','key9',
      'enter','standBy','complete',
      'error','ready','exceed',
      'release','weaponHit','ring'
    ]);
    warmupDone = true;
    maybeFinishBoot();
  }

  async function startBoot(){
    if(bootPlayed) return;
    bootPlayed = true;

    await ensureAudioReady();

    // 提前开始拉取关键音效
    warmupCritical();

    // iPhone Safari 上开机音直接用 HTMLAudio，最贴近用户手势链路
    try{
      bootAudio.currentTime = 0;
      await bootAudio.play();
    }catch(err){
      console.error('[bootAudio play failed]', err);
      // 即便失败，也不要永远锁死
      bootEnded = true;
      maybeFinishBoot();
      return;
    }

    bootAudio.onended = () => {
      bootEnded = true;
      maybeFinishBoot();
    };

    // 兜底，防止 ended 不触发
    setTimeout(() => {
      if (!bootEnded) {
        bootEnded = true;
        maybeFinishBoot();
      }
    }, 5000);
  }

  function bootTrap(e){
    if(!booting) return;
    e.preventDefault();
    e.stopPropagation();
    if(typeof e.stopImmediatePropagation === 'function'){
      e.stopImmediatePropagation();
    }
    startBoot();
  }

  // 对 iPhone Safari，touchstart 比 click 更直接
  bootLock.addEventListener('touchstart', bootTrap, { capture:true, passive:false });
  bootLock.addEventListener('pointerdown', bootTrap, true);
  bootLock.addEventListener('click', bootTrap, true);

  function getDigitSound(k){
    if(k === '9') return 'key9';
    if(k === '1') return 'key1';
    if(k === '3') return 'key3';
    return 'key9';
  }

  function pressDigit(k){
    if(booting) return;
    interruptRing();
    buf = (buf + k).slice(-3);
    playBuffer(getDigitSound(k));
  }

  function onEnter(){
    if(booting) return;
    interruptRing();

    if(transformed){
      if(!readyOnce){
        playBuffer('ready');
        readyOnce = true;
        return;
      }
      playBuffer('enter');
      playBuffer('exceed');
      readyOnce = false;
      return;
    }

    if(armed){
      stopNode(standNode);
      standNode = null;
      const s = playBuffer('complete', {
        onended: () => {
          transformed = true;
          readyOnce = false;
          armed = false;
          buf = '';
        }
      });
      if(!s){
        transformed = true;
        readyOnce = false;
        armed = false;
        buf = '';
      }
      return;
    }

    playBuffer('enter');

    if(buf === TRANSFORM_CODE){
      stopNode(standNode);
      standNode = playBuffer('standBy');
      armed = true;
      return;
    }

    if(buf.length === 3){
      playBuffer('error');
      buf = '';
      armed = false;
      readyOnce = false;
    }
  }

  function onStar(){
    if(booting) return;
    interruptRing();
    if(transformed) playBuffer('weaponHit');
    else playBuffer('key9');
    buf = (buf + '*').slice(-3);
  }

  function ringStart(){
    if(booting) return;
    interruptRing();
    ringNode = playBuffer('ring', { loop:true });
  }

  function ringStop(){
    if(booting) return;
    interruptRing();
  }

  function onClear(){
    if(booting) return;
    interruptRing();

    if(!transformed){
      playBuffer('key9');
      buf = '';
      return;
    }

    playBuffer('key9');
    const s = playBuffer('release', {
      onended: () => {
        transformed = false;
        armed = false;
        readyOnce = false;
        buf = '';
      }
    });

    if(!s){
      transformed = false;
      armed = false;
      readyOnce = false;
      buf = '';
    }
  }

  // 页面一加载就提前拉取，减少首次等待
  window.addEventListener('load', () => {
    Object.keys(AUDIO_URLS).forEach(key => {
      try{ primeFetch(key); }catch{}
    });
  });

  document.querySelectorAll('.hit[data-k]').forEach(b => {
    const k = b.dataset.k;
    if(k === '*') b.addEventListener('click', onStar);
    else b.addEventListener('click', () => pressDigit(k));
  });

  document.getElementById('btnEnter').addEventListener('click', onEnter);
  document.getElementById('btnRing').addEventListener('click', ringStart);
  document.getElementById('btnStop').addEventListener('click', ringStop);
  document.getElementById('btnClear').addEventListener('click', onClear);

  function getPct(name){
    return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name)) || 0;
  }

  function setRectByName(el, name){
    el.style.left   = getPct(`--btn-${name}-left`) + '%';
    el.style.top    = getPct(`--btn-${name}-top`) + '%';
    el.style.width  = getPct(`--btn-${name}-w`) + '%';
    el.style.height = getPct(`--btn-${name}-h`) + '%';
  }

  window.place = function place(){
    document.querySelectorAll('.hit[data-btn]').forEach(el => {
      setRectByName(el, el.dataset.btn);
    });
  };

  window.addEventListener('load', window.place);
  window.addEventListener('resize', window.place);
})();
</script>

<script>
(() => {
  const root = document.documentElement;
  const hits = [...document.querySelectorAll('.hit[data-btn]')];
  let selected = null;

  function selectButton(el){
    hits.forEach(b => b.classList.remove('selected'));
    selected = el;
    if(selected) selected.classList.add('selected');
  }

  hits.forEach(el => {
    el.addEventListener('click', () => selectButton(el));
  });

  function getVar(name){
    return parseFloat(getComputedStyle(root).getPropertyValue(name)) || 0;
  }

  function setVar(name, value){
    root.style.setProperty(name, value.toFixed(2) + '%');
  }

  function selectedVar(suffix){
    if(!selected) return null;
    return `--btn-${selected.dataset.btn}-${suffix}`;
  }

  function nudgeSelected(suffix, delta){
    const varName = selectedVar(suffix);
    if(!varName) return;
    setVar(varName, getVar(varName) + delta);
    if (typeof window.place === 'function') window.place();
  }

  window.addEventListener('keydown', (e) => {
    if (!selected) return;
    const step = e.altKey ? 0.1 : 0.3;

    switch (e.key) {
      case 'ArrowLeft':
        e.preventDefault();
        nudgeSelected('left', -step);
        break;
      case 'ArrowRight':
        e.preventDefault();
        nudgeSelected('left', step);
        break;
      case 'ArrowUp':
        e.preventDefault();
        nudgeSelected('top', -step);
        break;
      case 'ArrowDown':
        e.preventDefault();
        nudgeSelected('top', step);
        break;
      case '[':
        e.preventDefault();
        nudgeSelected('w', -step);
        break;
      case ']':
        e.preventDefault();
        nudgeSelected('w', step);
        break;
      case '-':
        e.preventDefault();
        nudgeSelected('h', -step);
        break;
      case '=':
        e.preventDefault();
        nudgeSelected('h', step);
        break;
      case 'p':
      case 'P': {
        const btn = selected.dataset.btn;
        console.log(`${btn}`, {
          left: getVar(`--btn-${btn}-left`),
          top:  getVar(`--btn-${btn}-top`),
          w:    getVar(`--btn-${btn}-w`),
          h:    getVar(`--btn-${btn}-h`)
        });
        break;
      }
    }
  });

  const enter = document.querySelector('[data-btn="enter"]');
  if (enter) selectButton(enter);
})();
</script>
</body>
</html>
