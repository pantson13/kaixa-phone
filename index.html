<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>KAIXA Phone</title>
<style>
  :root{
    --ui: url('assets/ui.jpg');
    --bg:#000;
    --fg:#fff;

    /* ===== 主按键 ===== */
    --btn-enter-left: 27.4%;
    --btn-enter-top:  53.1%;
    --btn-enter-w:    29.4%;
    --btn-enter-h:    4.9%;

    --btn-ring-left:  26%;
    --btn-ring-top:   59.7%;
    --btn-ring-w:     14%;
    --btn-ring-h:     4.15%;

    --btn-clear-left: 42%;
    --btn-clear-top:  60.8%;
    --btn-clear-w:    15%;
    --btn-clear-h:    4.15%;

    --btn-stop-left:  59%;
    --btn-stop-top:   59.7%;
    --btn-stop-w:     13.1%;
    --btn-stop-h:     4.15%;

    --btn-1-left:     26%;
    --btn-1-top:      65%;
    --btn-1-w:        14%;
    --btn-1-h:        4.15%;

    --btn-2-left:     42%;
    --btn-2-top:      66%;
    --btn-2-w:        15%;
    --btn-2-h:        4.15%;

    --btn-3-left:     59%;
    --btn-3-top:      65%;
    --btn-3-w:        13.1%;
    --btn-3-h:        4.15%;

    --btn-4-left:     26%;
    --btn-4-top:      70.5%;
    --btn-4-w:        14%;
    --btn-4-h:        4.15%;

    --btn-5-left:     42%;
    --btn-5-top:      71%;
    --btn-5-w:        15%;
    --btn-5-h:        4.15%;

    --btn-6-left:     59%;
    --btn-6-top:      70.5%;
    --btn-6-w:        13.1%;
    --btn-6-h:        4.15%;

    --btn-7-left:     26%;
    --btn-7-top:      75.7%;
    --btn-7-w:        14%;
    --btn-7-h:        4.15%;

    --btn-8-left:     42%;
    --btn-8-top:      76%;
    --btn-8-w:        15%;
    --btn-8-h:        4.15%;

    --btn-9-left:     59%;
    --btn-9-top:      75.7%;
    --btn-9-w:        13.1%;
    --btn-9-h:        4.15%;

    --btn-star-left:  26%;
    --btn-star-top:   81%;
    --btn-star-w:     13.1%;
    --btn-star-h:     4.15%;

    --btn-0-left:     42%;
    --btn-0-top:      82%;
    --btn-0-w:        15%;
    --btn-0-h:        4.15%;

    --btn-hash-left:  59%;
    --btn-hash-top:   81%;
    --btn-hash-w:     13.1%;
    --btn-hash-h:     4.15%;

    /* OPEN 按钮 */
    --btn-power-left: 8%;
    --btn-power-top:  90.5%;
    --btn-power-w:    10%;
    --btn-power-h:    10%;

    /* 中间方形模式按钮 */
    --btn-mode-left:  9%;
    --btn-mode-top:   38%;
    --btn-mode-w:     5%;
    --btn-mode-h:     13%;

    /* ===== 顶部四个圆形按钮 ===== */
    --btn-top1-left: 6%;
    --btn-top1-top:  4%;
    --btn-top1-w:    18%;
    --btn-top1-h:    9%;

    --btn-top2-left: 29%;
    --btn-top2-top:  4%;
    --btn-top2-w:    18%;
    --btn-top2-h:    9%;

    --btn-top3-left: 53%;
    --btn-top3-top:  4%;
    --btn-top3-w:    18%;
    --btn-top3-h:    9%;

    --btn-top4-left: 77%;
    --btn-top4-top:  4%;
    --btn-top4-w:    18%;
    --btn-top4-h:    9%;

    /* ===== 四个弹框 ===== */
    --popup1-left: 6%;
    --popup1-top:  15%;
    --popup1-w:    88%;
    --popup1-h:    25%;

    --popup2-left: 6%;
    --popup2-top:  15%;
    --popup2-w:    88%;
    --popup2-h:    25%;

    --popup3-left: 6%;
    --popup3-top:  15%;
    --popup3-w:    88%;
    --popup3-h:    25%;

    --popup4-left: 6%;
    --popup4-top:  15%;
    --popup4-w:    88%;
    --popup4-h:    25%;

    /* ===== popup1 内四张图：可单独调位置和大小 ===== */
    --popup1-img1-left: 4%;
    --popup1-img1-top:  20%;
    --popup1-img1-w:    20%;
    --popup1-img1-h:    58%;

    --popup1-img2-left: 28%;
    --popup1-img2-top:  20%;
    --popup1-img2-w:    20%;
    --popup1-img2-h:    58%;

    --popup1-img3-left: 52%;
    --popup1-img3-top:  20%;
    --popup1-img3-w:    20%;
    --popup1-img3-h:    58%;

    --popup1-img4-left: 76%;
    --popup1-img4-top:  20%;
    --popup1-img4-w:    20%;
    --popup1-img4-h:    58%;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; background:var(--bg); color:var(--fg); }
  body{ display:flex; justify-content:center; }
  .wrap{ width:min(94vw, 520px); margin:12px auto 48px; }

  .phone{ position:relative; width:100%; }
  .phone img{
    width:100%;
    height:auto;
    display:block;
    user-select:none;
    pointer-events:none;
  }

  .hit{
    position:absolute;
    border:none;
    outline:none;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
    transform-origin:center;
    cursor:pointer;
    background:rgba(255,0,0,.22);
    border:1.5px dashed #00ffff;
    border-radius:8px;
  }
  .hit:active{ transform:scale(.98); }

  .hit::after{
    content: attr(aria-label);
    position:absolute;
    left:4px;
    top:2px;
    font:600 10px/1 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color:#00ffff;
    text-shadow:0 0 3px #000;
    pointer-events:none;
  }

  .hit.circle{
    border-radius:999px;
  }

  .popup{
    position:absolute;
    background:rgba(0,0,0,.6);
    border:1.5px dashed #00ffff;
    border-radius:12px;
    display:none;
  }

  .popup.show{
    display:block;
  }

  .popup::after{
    content: attr(data-label);
    position:absolute;
    left:8px;
    top:6px;
    font:600 12px/1 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color:#00ffff;
    text-shadow:0 0 3px #000;
    pointer-events:none;
  }

  .popup-layer{
    position:absolute;
    inset:0;
  }

  .popup-item{
    position:absolute;
  }

  .popup-item img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.12);
    border-radius:8px;
  }

  .popup-item.is-clickable{
    cursor:pointer;
  }

  .popup-item-label{
    margin-top:4px;
    font:600 10px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color:#d9e8ff;
    text-align:center;
    white-space:nowrap;
  }

  .tip{
    width:min(94vw, 520px);
    margin:6px auto 0;
    padding:8px 10px;
    color:#d9e8ff;
    font:12px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    opacity:.92;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="phone" id="phone">
      <img src="assets/ui.jpg" alt="KAIXA UI" id="ui"/>

      <button class="hit circle" id="btnTop1" aria-label="TOP1" data-btn="top1"></button>
      <button class="hit circle" id="btnTop2" aria-label="TOP2" data-btn="top2"></button>
      <button class="hit circle" id="btnTop3" aria-label="TOP3" data-btn="top3"></button>
      <button class="hit circle" id="btnTop4" aria-label="TOP4" data-btn="top4"></button>

      <div class="popup" id="popup1" data-label="POPUP1">
        <div class="popup-layer">
          <div class="popup-item is-clickable" id="popup1-item1">
            <img src="assets/sigle mode.jpg" alt="sigle mode">
            <div class="popup-item-label">sigle mode</div>
          </div>

          <div class="popup-item is-clickable" id="popup1-item2">
            <img src="assets/burst mode.jpg" alt="burst mode">
            <div class="popup-item-label">burst mode</div>
          </div>

          <div class="popup-item" id="popup1-item3">
            <img src="assets/ready.jpg" alt="ready">
            <div class="popup-item-label">ready</div>
          </div>

          <div class="popup-item" id="popup1-item4">
            <img src="assets/ec.jpg" alt="ec">
            <div class="popup-item-label">ec</div>
          </div>
        </div>
      </div>

      <div class="popup" id="popup2" data-label="POPUP2"></div>
      <div class="popup" id="popup3" data-label="POPUP3"></div>
      <div class="popup" id="popup4" data-label="POPUP4"></div>

      <button class="hit" id="btnMode" aria-label="MODE" data-btn="mode"></button>

      <button class="hit" id="btnEnter" aria-label="ENTER" data-btn="enter"></button>

      <button class="hit" id="btnRing"  aria-label="铃声"   data-btn="ring"></button>
      <button class="hit" id="btnClear" aria-label="クリア" data-btn="clear"></button>
      <button class="hit" id="btnStop"  aria-label="停止"   data-btn="stop"></button>

      <button class="hit" data-k="1" aria-label="1" data-btn="1"></button>
      <button class="hit" data-k="2" aria-label="2" data-btn="2"></button>
      <button class="hit" data-k="3" aria-label="3" data-btn="3"></button>

      <button class="hit" data-k="4" aria-label="4" data-btn="4"></button>
      <button class="hit" data-k="5" aria-label="5" data-btn="5"></button>
      <button class="hit" data-k="6" aria-label="6" data-btn="6"></button>

      <button class="hit" data-k="7" aria-label="7" data-btn="7"></button>
      <button class="hit" data-k="8" aria-label="8" data-btn="8"></button>
      <button class="hit" data-k="9" aria-label="9" data-btn="9"></button>

      <button class="hit" data-k="*" aria-label="*" data-btn="star"></button>
      <button class="hit" data-k="0" aria-label="0" data-btn="0"></button>
      <button class="hit" data-k="#" aria-label="#" data-btn="hash"></button>

      <button class="hit" id="btnPower" aria-label="OPEN" data-btn="power"></button>
    </div>

    <div class="tip">
      popup1：第一张图点播 smbiu。第二张图第一次播 burst mode，再按一次播 bmbiu，循环。
    </div>
  </div>

<script>
(() => {
  const BASE = {
    openPhone:  'assets/open phone',
    ring:       'assets/ring',
    enter:      'assets/enter',
    key1:       'assets/key1',
    key3:       'assets/key3',
    key9:       'assets/key9',
    standBy:    'assets/stand by',
    complete:   'assets/complete',
    error:      'assets/error',
    ready:      'assets/ready',
    exceed:     'assets/exceed charge',
    release:    'assets/release',
    weaponHit:  'assets/weaponHit',
    burstMode:  'assets/burst mode',
    singleMode: 'assets/sigle mode',
    bmbiu:      'assets/bmbiu',
    smbiu:      'assets/smbiu',
    putToDeath: 'assets/put to death'
  };

  const EXT = ['.m4a','.mp3','.wav','.mp4'];
  const urlMap = {};

  let ac = null, master = null;
  const buffers = new Map();

  let popupBurstToggle = 0;

  function ctx(){
    if(ac) return ac;
    const C = window.AudioContext || window.webkitAudioContext;
    ac = new C({ latencyHint:'interactive' });
    master = ac.createGain();
    master.gain.value = 1;
    master.connect(ac.destination);
    return ac;
  }

  async function resolveUrl(base){
    if(urlMap[base]) return urlMap[base];
    for(const ext of EXT){
      const u = `${base}${ext}`;
      try{
        const r = await fetch(u,{ method:'HEAD', cache:'no-store' });
        if(r.ok){
          urlMap[base] = u;
          return u;
        }
      }catch{}
    }
    return null;
  }

  async function load(key){
    if(buffers.has(key)) return buffers.get(key);
    const url = await resolveUrl(BASE[key]);
    if(!url) return null;

    const res = await fetch(url,{ cache:'no-store' });
    if(!res.ok) return null;

    const arr = await res.arrayBuffer();
    const b = await ctx().decodeAudioData(arr);
    buffers.set(key,b);
    return b;
  }

  function play(key,{loop=false}={}){
    const b = buffers.get(key);
    if(!b) return null;
    const s = ctx().createBufferSource();
    s.buffer = b;
    s.loop = !!loop;
    s.connect(master);
    s.start();
    return s;
  }

  function stop(n){
    if(n && n.stop){
      try{ n.stop(); }catch{}
    }
  }

  const TRANSFORM_CODE = '913';

  let buf = '';
  let transformed = false;
  let armed = false;
  let readyOnce = false;
  let ringNode = null;
  let standNode = null;
  let audioReady = false;

  let modeAction = null;
  let modeRemaining = 0;
  let modeTimer = null;
  let modeUsed = false;

  function interruptRing(){
    if(ringNode){
      stop(ringNode);
      ringNode = null;
    }
  }

  function clearModeGrant(){
    modeAction = null;
    modeRemaining = 0;
    modeUsed = false;
    if(modeTimer){
      clearTimeout(modeTimer);
      modeTimer = null;
    }
  }

  function grantMode(action, count){
    clearModeGrant();
    modeAction = action;
    modeRemaining = count;
    modeUsed = false;
    modeTimer = setTimeout(() => {
      if(!modeUsed){
        clearModeGrant();
      }
    }, 8000);
  }

  async function ensureReady(){
    const c = ctx();
    try{
      if(c.state === 'suspended') await c.resume();
    }catch{}

    if(!audioReady){
      await Promise.all(Object.keys(BASE).map(k => load(k).catch(()=>null)));
      audioReady = true;
    }
  }

  async function onPower(){
    if(transformed) return;
    await ensureReady();
    play('openPhone');
  }

  async function onModeButton(){
    if(!audioReady) return;
    if(!transformed) return;
    if(!modeAction || modeRemaining <= 0) return;

    if(!modeUsed){
      modeUsed = true;
      if(modeTimer){
        clearTimeout(modeTimer);
        modeTimer = null;
      }
    }

    if(modeAction === 'burst'){
      play('bmbiu');
    }else if(modeAction === 'single'){
      play('smbiu');
    }

    modeRemaining -= 1;
    if(modeRemaining <= 0){
      clearModeGrant();
    }
  }

  function getDigitSound(k){
    if(k === '9') return 'key9';
    if(k === '1') return 'key1';
    if(k === '3') return 'key3';
    return 'key9';
  }

  function pressDigit(k){
    if(!audioReady) return;
    interruptRing();
    buf = (buf + k).slice(-3);
    play(getDigitSound(k));
  }

  function onEnter(){
    if(!audioReady) return;
    interruptRing();

    if(transformed){
      if(buf === '106'){
        play('enter');
        play('burstMode');
        grantMode('burst', 2);
        buf = '';
        return;
      }

      if(buf === '103'){
        play('enter');
        play('singleMode');
        grantMode('single', 3);
        buf = '';
        return;
      }

      if(!readyOnce){
        play('ready');
        readyOnce = true;
        return;
      }
      play('enter');
      play('exceed');
      readyOnce = false;
      return;
    }

    if(armed){
      stop(standNode);
      standNode = null;
      const s = play('complete');
      const done = () => {
        transformed = true;
        readyOnce = false;
        armed = false;
        buf = '';
        clearModeGrant();
      };
      if(s) s.onended = done;
      else setTimeout(done, 380);
      return;
    }

    play('enter');

    if(buf === TRANSFORM_CODE){
      stop(standNode);
      standNode = play('standBy');
      if(standNode) standNode.onended = () => standNode = null;
      armed = true;
      return;
    }

    if(buf.length === 3){
      play('error');
      buf = '';
      armed = false;
      readyOnce = false;
    }
  }

  function onStar(){
    if(!audioReady) return;
    interruptRing();
    if(transformed) play('weaponHit');
    else play('key9');
    buf = (buf + '*').slice(-3);
  }

  function ringStart(){
    if(!audioReady) return;
    interruptRing();
    ringNode = play('ring',{loop:true});
  }

  function ringStop(){
    if(!audioReady) return;
    interruptRing();
  }

  function onClear(){
    if(!audioReady) return;
    interruptRing();

    if(!transformed){
      play('key9');
      buf = '';
      return;
    }

    play('key9');
    const s = play('release');
    const done = () => {
      transformed = false;
      armed = false;
      readyOnce = false;
      buf = '';
      clearModeGrant();
    };
    if(s) s.onended = done;
    else done();
  }

  function showExclusivePopup(id){
    ['popup1','popup2','popup3','popup4'].forEach(pid => {
      const el = document.getElementById(pid);
      if(pid === id){
        el.classList.toggle('show');
      }else{
        el.classList.remove('show');
      }
    });
  }

  document.getElementById('btnTop1').addEventListener('click', () => showExclusivePopup('popup1'));
  document.getElementById('btnTop2').addEventListener('click', () => showExclusivePopup('popup2'));
  document.getElementById('btnTop3').addEventListener('click', () => showExclusivePopup('popup3'));
  document.getElementById('btnTop4').addEventListener('click', () => showExclusivePopup('popup4'));

  document.getElementById('popup1-item1').addEventListener('click', async (e) => {
    e.stopPropagation();
    await ensureReady();
    play('smbiu');
  });

  document.getElementById('popup1-item2').addEventListener('click', async (e) => {
    e.stopPropagation();
    await ensureReady();

    if(popupBurstToggle === 0){
      play('burstMode');
      popupBurstToggle = 1;
    }else{
      play('bmbiu');
      popupBurstToggle = 0;
    }
  });

  document.querySelectorAll('.hit[data-k]').forEach(b => {
    const k = b.dataset.k;
    if(k === '*') b.addEventListener('click', onStar);
    else b.addEventListener('click', () => pressDigit(k));
  });

  document.getElementById('btnEnter').addEventListener('click', onEnter);
  document.getElementById('btnRing').addEventListener('click', ringStart);
  document.getElementById('btnStop').addEventListener('click', ringStop);
  document.getElementById('btnClear').addEventListener('click', onClear);
  document.getElementById('btnPower').addEventListener('click', onPower);
  document.getElementById('btnMode').addEventListener('click', onModeButton);

  function getPct(name){
    return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name)) || 0;
  }

  function setRectByName(el, name){
    el.style.left   = getPct(`--btn-${name}-left`) + '%';
    el.style.top    = getPct(`--btn-${name}-top`) + '%';
    el.style.width  = getPct(`--btn-${name}-w`) + '%';
    el.style.height = getPct(`--btn-${name}-h`) + '%';
  }

  function setPopupRect(el, idx){
    el.style.left   = getPct(`--popup${idx}-left`) + '%';
    el.style.top    = getPct(`--popup${idx}-top`) + '%';
    el.style.width  = getPct(`--popup${idx}-w`) + '%';
    el.style.height = getPct(`--popup${idx}-h`) + '%';
  }

  function setPopupItemRect(el, idx){
    el.style.left   = getPct(`--popup1-img${idx}-left`) + '%';
    el.style.top    = getPct(`--popup1-img${idx}-top`) + '%';
    el.style.width  = getPct(`--popup1-img${idx}-w`) + '%';
    el.style.height = getPct(`--popup1-img${idx}-h`) + '%';
  }

  function place(){
    document.querySelectorAll('.hit[data-btn]').forEach(el => {
      setRectByName(el, el.dataset.btn);
    });

    setPopupRect(document.getElementById('popup1'), 1);
    setPopupRect(document.getElementById('popup2'), 2);
    setPopupRect(document.getElementById('popup3'), 3);
    setPopupRect(document.getElementById('popup4'), 4);

    setPopupItemRect(document.getElementById('popup1-item1'), 1);
    setPopupItemRect(document.getElementById('popup1-item2'), 2);
    setPopupItemRect(document.getElementById('popup1-item3'), 3);
    setPopupItemRect(document.getElementById('popup1-item4'), 4);
  }

  window.addEventListener('load', place);
  window.addEventListener('resize', place);
})();
</script>
</body>
</html>
