<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>KAIXA Phone</title>
<style>
  :root{
    --ui: url('assets/ui.jpg');
    --bg:#000;
    --fg:#fff;

    /* ===== 每个按钮单独控制：left / top / width / height ===== */
    --btn-enter-left: 27.4%;
    --btn-enter-top:  53.1%;
    --btn-enter-w:    29.4%;

    --btn-ring-left:  26%;
    --btn-ring-top:   59.7%;
    --btn-ring-w:     14%;

    --btn-clear-left: 42%;
    --btn-clear-top:  60.8%;
    --btn-clear-w:    15%;
    --btn-clear-h:    4.15%;

    --btn-stop-left:  59%;
    --btn-stop-top:   59.7%;
    --btn-stop-w:     13.1%;
    --btn-stop-h:     4.15%;

    --btn-1-left:     26%;
    --btn-1-top:      65%;
    --btn-1-w:        14%;
    --btn-1-h:        4.15%;

    --btn-2-left:     42%;
    --btn-2-top:      66%;
    --btn-2-w:        15%;
    --btn-2-h:        4.15%;

    --btn-3-left:     59%;
    --btn-3-top:      65%;
    --btn-3-w:        13.1%;
    --btn-3-h:        4.15%;

    --btn-4-left:     26%;
    --btn-4-top:      70.5%;
    --btn-4-w:        14%;
    --btn-4-h:        4.15%;

    --btn-5-left:     42%;
    --btn-5-top:      71%;
    --btn-5-w:        15%;
    --btn-5-h:        4.15%;

    --btn-6-left:     59%;
    --btn-6-top:      70.5%;
    --btn-6-w:        13.1%;
    --btn-6-h:        4.15%;

    --btn-7-left:     26%;
    --btn-7-top:      75.7%;
    --btn-7-w:        14%;
    --btn-7-h:        4.15%;

    --btn-8-left:     42%;
    --btn-8-top:      76%;
    --btn-8-w:        15%;
    --btn-8-h:        4.15%;

    --btn-9-left:     59%;
    --btn-9-top:      75.7%;
    --btn-9-w:        13.1%;
    --btn-9-h:        4.15%;

    --btn-star-left:  26%;
    --btn-star-top:   81%;
    --btn-star-w:     13.1%;
    --btn-star-h:     4.15%;

    --btn-0-left:     42%;
    --btn-0-top:      82%;
    --btn-0-w:        15%;
    --btn-0-h:        4.15%;

    --btn-hash-left:  59%;
    --btn-hash-top:   81%;
    --btn-hash-w:     13.1%;
    --btn-hash-h:     4.15%;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; background:var(--bg); color:var(--fg); }
  body{ display:flex; justify-content:center; }
  .wrap{ width:min(94vw, 520px); margin:12px auto 48px; }

  .phone{ position:relative; width:100%; }
  .phone img{ width:100%; height:auto; display:block; user-select:none; pointer-events:none; }

  .hit{
    position:absolute;
    outline:none;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
    transform-origin:center;
    cursor:pointer;

    /* 调试框显示 */
    background:rgba(255,0,0,.22);
    border:1.5px dashed #00ffff;
    border-radius:8px;
  }
  .hit:active{ transform:scale(.98); }

  .hit::after{
    content: attr(aria-label);
    position:absolute;
    left:4px;
    top:2px;
    font:600 10px/1 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color:#00ffff;
    text-shadow:0 0 3px #000;
    pointer-events:none;
  }

  .hit.selected{
    border:2px solid #ffe600;
    box-shadow:0 0 0 2px rgba(0,0,0,.55) inset, 0 0 10px rgba(255,230,0,.7);
  }

  .tip{
    width:min(94vw, 520px);
    margin:6px auto 0;
    padding:8px 10px;
    color:#d9e8ff;
    font:12px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    opacity:.92;
  }

  .boot-lock{
    position:fixed;
    inset:0;
    z-index:9999;
    background:transparent;
    cursor:pointer;
  }
</style>
</head>
<body>
  <div>
    <div class="wrap">
      <div class="phone" id="phone">
        <img src="assets/ui.jpg" alt="KAIXA UI" id="ui"/>

        <button class="hit" id="btnEnter" aria-label="ENTER" data-btn="enter"></button>

        <button class="hit" id="btnRing"  aria-label="铃声"   data-btn="ring"></button>
        <button class="hit" id="btnClear" aria-label="クリア" data-btn="clear"></button>
        <button class="hit" id="btnStop"  aria-label="停止"   data-btn="stop"></button>

        <button class="hit" data-k="1" aria-label="1" data-btn="1"></button>
        <button class="hit" data-k="2" aria-label="2" data-btn="2"></button>
        <button class="hit" data-k="3" aria-label="3" data-btn="3"></button>

        <button class="hit" data-k="4" aria-label="4" data-btn="4"></button>
        <button class="hit" data-k="5" aria-label="5" data-btn="5"></button>
        <button class="hit" data-k="6" aria-label="6" data-btn="6"></button>

        <button class="hit" data-k="7" aria-label="7" data-btn="7"></button>
        <button class="hit" data-k="8" aria-label="8" data-btn="8"></button>
        <button class="hit" data-k="9" aria-label="9" data-btn="9"></button>

        <button class="hit" data-k="*" aria-label="*" data-btn="star"></button>
        <button class="hit" data-k="0" aria-label="0" data-btn="0"></button>
        <button class="hit" data-k="#" aria-label="#" data-btn="hash"></button>
      </div>
    </div>

    <div class="tip">
      首次点击屏幕任意位置只会播放 open phone，播完后才开放其他交互。<br>
      这版严格沿用 FAIZ 的音效加载与播放方式。<br>
      点击任意按钮可选中。方向键移动，Alt + 方向键微调，[ / ] 调宽，- / = 调高，P 输出当前参数。
    </div>
  </div>

  <div class="boot-lock" id="bootLock" aria-hidden="true"></div>

<script>
(() => {
  /* ------------ 资源（严格沿用 FAIZ 的自动匹配扩展名方式） ------------ */
  const BASE = {
    openPhone: 'assets/open phone',
    ring:      'assets/ring',
    enter:     'assets/enter',
    key1:      'assets/key1',
    key3:      'assets/key3',
    key9:      'assets/key9',
    standBy:   'assets/stand by',
    complete:  'assets/complete',
    error:     'assets/error',
    ready:     'assets/ready',
    exceed:    'assets/exceed charge',
    release:   'assets/release',
    weaponHit: 'assets/weaponHit'
  };
  const EXT = ['.m4a','.mp3','.wav','.mp4'];
  const urlMap = {};

  let ac = null, master = null;
  const buffers = new Map();

  function ctx(){
    if(ac) return ac;
    const C = window.AudioContext || window.webkitAudioContext;
    ac = new C({ latencyHint:'interactive' });
    master = ac.createGain();
    master.gain.value = 1;
    master.connect(ac.destination);
    return ac;
  }

  async function resolveUrl(base){
    if(urlMap[base]) return urlMap[base];
    for(const ext of EXT){
      const u = `${base}${ext}`;
      try{
        const r = await fetch(u, { method:'HEAD', cache:'no-store' });
        if(r.ok){
          urlMap[base] = u;
          return u;
        }
      }catch{}
    }
    return null;
  }

  async function load(key){
    if(buffers.has(key)) return buffers.get(key);
    const url = await resolveUrl(BASE[key]);
    if(!url) return null;
    const res = await fetch(url, { cache:'no-store' });
    if(!res.ok) return null;
    const arr = await res.arrayBuffer();
    const b = await ctx().decodeAudioData(arr);
    buffers.set(key, b);
    return b;
  }

  function play(key,{loop=false}={}){
    const b = buffers.get(key);
    if(!b) return null;
    const s = ctx().createBufferSource();
    s.buffer = b;
    s.loop = !!loop;
    s.connect(master);
    s.start();
    return s;
  }

  function stop(n){
    if(n && n.stop){
      try{ n.stop(); }catch{}
    }
  }

  /* ------------ 状态 ------------ */
  const TRANSFORM_CODE = '913';

  let buf = '';
  let transformed = false;
  let armed = false;
  let readyOnce = false;

  let ringNode = null;
  let standNode = null;

  let booting = true;
  let bootPlayed = false;

  const bootLock = document.getElementById('bootLock');

  function interruptRing(){
    if(ringNode){
      stop(ringNode);
      ringNode = null;
    }
  }

  async function unlock(){
    const c = ctx();
    try{
      if(c.state === 'suspended') await c.resume();
    }catch{}
    await Promise.all(Object.keys(BASE).map(k => load(k).catch(() => null)));
  }

  async function start
