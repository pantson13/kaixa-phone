<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>KAIXA Phone</title>
<style>
  :root{
    --ui: url('assets/ui.jpg');

    --bg:#000;
    --fg:#fff;

    /* ===== 每个按钮单独控制：left / top / width / height ===== */

    /* ENTER */
    --btn-enter-left: 27.4%;
    --btn-enter-top:  53.1%;
    --btn-enter-w:    29.4%;
    --btn-enter-h:    4.9%;

    /* 第二行 */
    --btn-ring-left:  26%;
    --btn-ring-top:   59.7%;
    --btn-ring-w:     14%;
    --btn-ring-h:     4.15%;

    --btn-clear-left: 42%;
    --btn-clear-top:  60.8%;
    --btn-clear-w:    15%;
    --btn-clear-h:    4.15%;

    --btn-stop-left:  59%;
    --btn-stop-top:   59.7%;
    --btn-stop-w:     13.1%;
    --btn-stop-h:     4.15%;

    /* 数字区 */
    --btn-1-left:     26%;
    --btn-1-top:      65%;
    --btn-1-w:        14%;
    --btn-1-h:        4.15%;

    --btn-2-left:     42%;
    --btn-2-top:      66%;
    --btn-2-w:        15%;
    --btn-2-h:        4.15%;

    --btn-3-left:     59%;
    --btn-3-top:      65%;
    --btn-3-w:        13.1%;
    --btn-3-h:        4.15%;

    --btn-4-left:     26%;
    --btn-4-top:      70.5%;
    --btn-4-w:        14%;
    --btn-4-h:        4.15%;

    --btn-5-left:     42%;
    --btn-5-top:      71%;
    --btn-5-w:        15%;
    --btn-5-h:        4.15%;

    --btn-6-left:     59%;
    --btn-6-top:      70.5%;
    --btn-6-w:        13.1%;
    --btn-6-h:        4.15%;

    --btn-7-left:     26%;
    --btn-7-top:      75.7%;
    --btn-7-w:        14%;
    --btn-7-h:        4.15%;

    --btn-8-left:     42%;
    --btn-8-top:      76%;
    --btn-8-w:        15%;
    --btn-8-h:        4.15%;

    --btn-9-left:     59%;
    --btn-9-top:      75.7%;
    --btn-9-w:        13.1%;
    --btn-9-h:        4.15%;

    --btn-star-left:  26%;
    --btn-star-top:   81%;
    --btn-star-w:     13.1%;
    --btn-star-h:     4.15%;

    --btn-0-left:     42%;
    --btn-0-top:      82%;
    --btn-0-w:        15%;
    --btn-0-h:        4.15%;

    --btn-hash-left:  59%;
    --btn-hash-top:   81%;
    --btn-hash-w:     13.1%;
    --btn-hash-h:     4.15%;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent }
  html,body{ height:100%; margin:0; background:var(--bg); color:var(--fg); }
  body{ display:flex; justify-content:center; }
  .wrap{ width:min(94vw, 520px); margin:12px auto 48px; }

  .phone{ position:relative; width:100%; }
  .phone img{ width:100%; height:auto; display:block; user-select:none; pointer-events:none; }

  .hit{
    position:absolute;
    border:none;
    outline:none;
    background:transparent;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
    transform-origin:center;
    cursor:pointer;
  }
  .hit:active{ transform:scale(.98); }

  /* ===== 调试描边：对齐OK后可注释掉 ===== */
  .hit{
    background:rgba(255,0,0,.22);
    border:1.5px dashed #00ffff;
    border-radius:8px;
  }
  .hit::after{
    content: attr(aria-label);
    position:absolute;
    left:4px;
    top:2px;
    font: 600 10px/1 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color:#00ffff;
    text-shadow:0 0 3px #000;
    pointer-events:none;
  }

  /* 当前选中的按钮 */
  .hit.selected{
    border:2px solid #ffe600;
    box-shadow:0 0 0 2px rgba(0,0,0,.55) inset, 0 0 10px rgba(255,230,0,.7);
  }

  .tip{
    width:min(94vw, 520px);
    margin:6px auto 0;
    padding:8px 10px;
    color:#d9e8ff;
    font:12px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    opacity:.92;
  }
</style>
</head>
<body>
  <div>
    <div class="wrap">
      <div class="phone" id="phone">
        <img src="assets/ui.jpg" alt="KAIXA UI" id="ui"/>

        <!-- ENTER -->
        <button class="hit" id="btnEnter" aria-label="ENTER" data-btn="enter"></button>

        <!-- 第二行 -->
        <button class="hit" id="btnRing"  aria-label="铃声"   data-btn="ring"></button>
        <button class="hit" id="btnClear" aria-label="クリア" data-btn="clear"></button>
        <button class="hit" id="btnStop"  aria-label="停止"   data-btn="stop"></button>

        <!-- 数字键 -->
        <button class="hit" data-k="1" aria-label="1" data-btn="1"></button>
        <button class="hit" data-k="2" aria-label="2" data-btn="2"></button>
        <button class="hit" data-k="3" aria-label="3" data-btn="3"></button>

        <button class="hit" data-k="4" aria-label="4" data-btn="4"></button>
        <button class="hit" data-k="5" aria-label="5" data-btn="5"></button>
        <button class="hit" data-k="6" aria-label="6" data-btn="6"></button>

        <button class="hit" data-k="7" aria-label="7" data-btn="7"></button>
        <button class="hit" data-k="8" aria-label="8" data-btn="8"></button>
        <button class="hit" data-k="9" aria-label="9" data-btn="9"></button>

        <button class="hit" data-k="*" aria-label="*" data-btn="star"></button>
        <button class="hit" data-k="0" aria-label="0" data-btn="0"></button>
        <button class="hit" data-k="#" aria-label="#" data-btn="hash"></button>
      </div>
    </div>

    <div class="tip">
      点击任意按钮可选中。<br>
      方向键：移动选中按钮　　Alt + 方向键：更细步进<br>
      [ / ]：调宽　　- / =：调高　　P：在控制台输出当前按钮参数
    </div>
  </div>

<script>
(() => {
  /* ------------ 资源（自动匹配 .m4a/.mp3/.wav/.mp4） ------------ */
  const BASE = {
    openPhone: 'assets/open phone',
    ring:      'assets/ring',
    enter:     'assets/enter',
    key9:      'assets/key9',
    standBy:   'assets/stand by',
    complete:  'assets/complete',
    error:     'assets/error',
    ready:     'assets/ready',
    exceed:    'assets/exceed charge',
    release:   'assets/release',
    combo3821: 'assets/3821',
    weaponHit: 'assets/weaponHit'
  };
  const EXT = ['.m4a','.mp3','.wav','.mp4'];
  const urlMap = {};

  let ac=null, master=null;
  const buffers=new Map();

  function ctx(){
    if(ac) return ac;
    const C=window.AudioContext||window.webkitAudioContext;
    ac=new C({latencyHint:'interactive'});
    master=ac.createGain();
    master.gain.value=1;
    master.connect(ac.destination);
    return ac;
  }

  async function resolveUrl(base){
    if(urlMap[base]) return urlMap[base];
    for(const ext of EXT){
      const u = `${base}${ext}`;
      try{
        const r = await fetch(u,{method:'HEAD',cache:'no-store'});
        if(r.ok){
          urlMap[base]=u;
          return u;
        }
      }catch{}
    }
    return null;
  }

  async function load(key){
    if(buffers.has(key)) return buffers.get(key);
    const url = await resolveUrl(BASE[key]);
    if(!url) return null;
    const res = await fetch(url,{cache:'no-store'});
    if(!res.ok) return null;
    const arr = await res.arrayBuffer();
    const b = await ctx().decodeAudioData(arr);
    buffers.set(key,b);
    return b;
  }

  function play(key,{loop=false}={}){
    const b=buffers.get(key);
    if(!b) return null;
    const s=ctx().createBufferSource();
    s.buffer=b;
    s.loop=!!loop;
    s.connect(master);
    s.start();
    return s;
  }

  function stop(n){
    if(n&&n.stop){
      try{n.stop();}catch{}
    }
  }

  /* ------------ 规则/状态 ------------ */
  const COMBOS=['555','106','103'];
  let buf='', transformed=false, armed=false, readyOnce=false;
  let ringNode=null, standNode=null;

  function interruptRing(){
    if(ringNode){
      stop(ringNode);
      ringNode=null;
    }
  }

  async function unlock(){
    const c=ctx();
    try{
      if(c.state==='suspended') await c.resume();
    }catch{}
    await Promise.all(Object.keys(BASE).map(k=>load(k).catch(()=>null)));
    play('openPhone');
  }

  const unlockOnce=()=>{
    unlock();
    document.removeEventListener('pointerdown',unlockOnce,true);
    document.removeEventListener('touchend',unlockOnce,true);
    document.removeEventListener('click',unlockOnce,true);
  };

  ['pointerdown','touchend','click'].forEach(ev =>
    document.addEventListener(ev,unlockOnce,{once:true,passive:true})
  );

  function pressDigit(k){
    interruptRing();
    const s=(buf+k).slice(-3);
    play('key9');
    buf=s;

    if(buf==='3821') play('combo3821');
  }

  function onEnter(){
    interruptRing();

    if(transformed){
      if(!readyOnce){
        play('ready');
        readyOnce=true;
        return;
      }
      play('enter');
      play('exceed');
      readyOnce=false;
      return;
    }

    if(armed){
      stop(standNode);
      standNode=null;
      const s=play('complete');
      const done=()=>{
        transformed=true;
        readyOnce=false;
        armed=false;
        buf='';
      };
      if(s) s.onended=done;
      else setTimeout(done,380);
      return;
    }

    play('enter');

    if(buf==='555'){
      stop(standNode);
      standNode=play('standBy');
      if(standNode) standNode.onended=()=>standNode=null;
      armed=true;
      return;
    }

    if(buf==='106'||buf==='103'){
      return;
    }

    if(buf.length===3 && buf!=='3821'){
      play('error');
      buf='';
      armed=false;
      readyOnce=false;
    }
  }

  function onStar(){
    interruptRing();
    if(transformed) play('weaponHit');
    else play('key9');
    buf=(buf+'*').slice(-3);
  }

  function ringStart(){
    interruptRing();
    ringNode=play('ring',{loop:true});
  }

  function ringStop(){
    interruptRing();
  }

  function onClear(){
    interruptRing();
    if(!transformed){
      play('key9');
      buf='';
      return;
    }
    play('key9');
    const s=play('release');
    const done=()=>{
      transformed=false;
      armed=false;
      readyOnce=false;
      buf='';
    };
    if(s) s.onended=done;
    else done();
  }

  /* ------------ 绑定 ------------ */
  document.querySelectorAll('.hit[data-k]').forEach(b=>{
    const k=b.dataset.k;
    if(k==='*') b.addEventListener('click', onStar);
    else b.addEventListener('click', ()=>pressDigit(k));
  });

  document.getElementById('btnEnter').addEventListener('click', onEnter);
  document.getElementById('btnRing').addEventListener('click', ringStart);
  document.getElementById('btnStop').addEventListener('click', ringStop);
  document.getElementById('btnClear').addEventListener('click', onClear);

  /* ------------ 独立摆放 ------------ */
  function getPct(name){
    return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name)) || 0;
  }

  function setRectByName(el, name){
    el.style.left   = getPct(`--btn-${name}-left`) + '%';
    el.style.top    = getPct(`--btn-${name}-top`) + '%';
    el.style.width  = getPct(`--btn-${name}-w`) + '%';
    el.style.height = getPct(`--btn-${name}-h`) + '%';
  }

  window.place = function place(){
    document.querySelectorAll('.hit[data-btn]').forEach(el=>{
      setRectByName(el, el.dataset.btn);
    });
  };

  window.addEventListener('load', window.place);
  window.addEventListener('resize', window.place);
})();
</script>

<script>
(() => {
  const root = document.documentElement;
  const hits = [...document.querySelectorAll('.hit[data-btn]')];
  let selected = null;

  function selectButton(el){
    hits.forEach(b => b.classList.remove('selected'));
    selected = el;
    if(selected) selected.classList.add('selected');
  }

  hits.forEach(el => {
    el.addEventListener('click', () => selectButton(el));
  });

  function getVar(name){
    return parseFloat(getComputedStyle(root).getPropertyValue(name)) || 0;
  }

  function setVar(name, value){
    root.style.setProperty(name, value.toFixed(2) + '%');
  }

  function selectedVar(suffix){
    if(!selected) return null;
    return `--btn-${selected.dataset.btn}-${suffix}`;
  }

  function nudgeSelected(suffix, delta){
    const varName = selectedVar(suffix);
    if(!varName) return;
    setVar(varName, getVar(varName) + delta);
    if (typeof window.place === 'function') window.place();
  }

  window.addEventListener('keydown', (e) => {
    if (!selected) return;

    const step = e.altKey ? 0.1 : 0.3;

    switch (e.key) {
      case 'ArrowLeft':
        e.preventDefault();
        nudgeSelected('left', -step);
        break;
      case 'ArrowRight':
        e.preventDefault();
        nudgeSelected('left', step);
        break;
      case 'ArrowUp':
        e.preventDefault();
        nudgeSelected('top', -step);
        break;
      case 'ArrowDown':
        e.preventDefault();
        nudgeSelected('top', step);
        break;

      case '[':
        e.preventDefault();
        nudgeSelected('w', -step);
        break;
      case ']':
        e.preventDefault();
        nudgeSelected('w', step);
        break;

      case '-':
        e.preventDefault();
        nudgeSelected('h', -step);
        break;
      case '=':
        e.preventDefault();
        nudgeSelected('h', step);
        break;

      case 'p':
      case 'P': {
        const btn = selected.dataset.btn;
        console.log(`${btn}`, {
          left: getVar(`--btn-${btn}-left`),
          top:  getVar(`--btn-${btn}-top`),
          w:    getVar(`--btn-${btn}-w`),
          h:    getVar(`--btn-${btn}-h`)
        });
        break;
      }
    }
  });

  // 默认选中 ENTER
  const enter = document.querySelector('[data-btn="enter"]');
  if (enter) selectButton(enter);
})();
</script>
</body>
</html>
