  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  .wrap{ width:min(94vw, 520px); margin:12px auto 48px; }

  .phone{ position:relative; width:100%; }
  .phone img{
    width:100%;
    height:auto;
    display:block;
    user-select:none;
    pointer-events:none;
  }

  .hit{
    position:absolute;
    border:none;
    outline:none;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
    transform-origin:center;
    cursor:pointer;
    background:transparent;
    border:none;
    border-radius:8px;
  }
  .hit:active{ transform:scale(.98); }

  .hit::after{
        display:none;
content: attr(aria-label);
    position:absolute;
    left:4px;
    top:2px;
    font:600 10px/1 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color:#00ffff;
    text-shadow:0 0 3px #000;
    pointer-events:none;
  }

  .hit.circle{
    border-radius:999px;
  }

  .popup{
    position:absolute;
    background:rgba(0,0,0,.6);    border:none;
    border-radius:12px;
    display:none;
  }

  .popup.show{
    display:block;
  }

  .popup::after{
        display:none;
content: attr(data-label);
    position:absolute;
    left:8px;
    top:6px;
    font:600 12px/1 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    color:#00ffff;
    text-shadow:0 0 3px #000;
    pointer-events:none;
  }

  .popup-layer{
    position:absolute;
    inset:0;
  }

  .popup-item{
    position:absolute;
  }

  .popup-item img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.12);

  .popup-item.is-clickable{

    color:#d9e8ff;
    font:12px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;

<script>
(() => {
  const BASE = {
    openPhone:  'assets/open phone',
    ring:       'assets/ring',
    enter:      'assets/enter',
    key1:       'assets/key1',
    key3:       'assets/key3',
    key9:       'assets/key9',
    standBy:    'assets/stand by',
    complete:   'assets/complete',
    error:      'assets/error',
    ready:      'assets/ready',
    exceed:     'assets/exceed charge',
    release:    'assets/release',
    weaponHit:  'assets/weaponHit',
    burstMode:  'assets/burst mode',
    singleMode: 'assets/sigle mode',
    bmbiu:      'assets/bmbiu',
    smbiu:      'assets/smbiu',
    putToDeath: 'assets/put to death'
  };

  const EXT = ['.m4a','.mp3','.wav','.mp4'];
  const urlMap = {};

  let ac = null, master = null;
  const buffers = new Map();

  let popupBurstToggle = 0;

  function createAudioContext(){
    const C = window.AudioContext || window.webkitAudioContext;
    if(!C) return null;

    ac = new C({ latencyHint:'interactive' });
    master = ac.createGain();
    master.gain.value = 1;
    master.connect(ac.destination);
    return ac;
  }

  function ctx(){
    if(ac && ac.state !== 'closed') return ac;
    return createAudioContext();
  }

  async function rebuildAudioContext(){
    const oldContext = ac;

    ac = null;
    master = null;
    ringNode = null;
    standNode = null;

    if(oldContext && oldContext.state !== 'closed'){
      try{
        await oldContext.close();
      }catch{}
    }

    const newContext = ctx();
    if(!newContext) return false;

    try{
      if(newContext.state !== 'running'){
        await newContext.resume();
      }
    }catch{}

    return newContext.state === 'running';
  }

  async function wakeAudio(){
    let c = ctx();
    if(!c) return false;

    if(c.state === 'suspended' || c.state === 'interrupted'){
      try{
        await c.resume();
      }catch{}
    }

    if(c.state === 'running') return true;

    return await rebuildAudioContext();
  }

  async function resolveUrl(base){
    if(urlMap[base]) return urlMap[base];
    for(const ext of EXT){
      const u = `${base}${ext}`;
      try{
        const r = await fetch(u,{ method:'HEAD', cache:'no-store' });
        if(r.ok){
          urlMap[base] = u;
          return u;
        }
      }catch{}
    }
    return null;
  }

  async function load(key){
    if(buffers.has(key)) return buffers.get(key);
    const url = await resolveUrl(BASE[key]);
    if(!url) return null;

    const res = await fetch(url,{ cache:'no-store' });
    if(!res.ok) return null;

    const arr = await res.arrayBuffer();
    const b = await ctx().decodeAudioData(arr);
    buffers.set(key,b);
    return b;
  }

  function play(key,{loop=false}={}){
    const b = buffers.get(key);
    const c = ctx();

    if(!b || !c || c.state !== 'running' || !master) return null;

    const s = c.createBufferSource();
    s.buffer = b;
    s.loop = !!loop;
    s.connect(master);
    s.start();
    return s;
  }

  function stop(n){
    if(n && n.stop){
      try{ n.stop(); }catch{}
    }
  }

  const TRANSFORM_CODE = '913';

  let buf = '';
  let transformed = false;
  let armed = false;
  let readyOnce = false;
  let ringNode = null;
  let standNode = null;
  let audioReady = false;

  let modeAction = null;
  let modeRemaining = 0;
  let modeTimer = null;
  let modeUsed = false;

  // 变身后：点击顶层第 3 或第 4 圆形按钮播放 ready，
  // 下一次按 ENTER 只播放 exceed charge。
  let topReadyArmed = false;

  // iPhone 可能在后台回收整个网页进程。
  // 用 localStorage 保存交互状态，重新载入后继续当前流程。
  const STATE_KEY = 'kaixa-phone-interaction-state-v1';
  let modeGrantExpiresAt = 0;
  let restoringState = false;

  function saveState(){
    if(restoringState) return;

    const state = {
      buf,
      transformed,
      armed,
      readyOnce,
      modeAction,
      modeRemaining,
      modeUsed,
      modeGrantExpiresAt,
      topReadyArmed,
      popupBurstToggle
    };

    try{
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }catch{}
  }

  function restoreState(){
    restoringState = true;

    try{
      const raw = localStorage.getItem(STATE_KEY);
      if(!raw) return;

      const state = JSON.parse(raw);

      buf = typeof state.buf === 'string' ? state.buf.slice(-3) : '';
      transformed = state.transformed === true;
      armed = state.armed === true;
      readyOnce = state.readyOnce === true;
      topReadyArmed = state.topReadyArmed === true;
      popupBurstToggle = state.popupBurstToggle === 1 ? 1 : 0;

      modeAction =
        state.modeAction === 'single' || state.modeAction === 'burst'
          ? state.modeAction
          : null;

      modeRemaining =
        Number.isFinite(state.modeRemaining) && state.modeRemaining > 0
          ? Math.floor(state.modeRemaining)
          : 0;

      modeUsed = state.modeUsed === true;
      modeGrantExpiresAt =
        Number.isFinite(state.modeGrantExpiresAt)
          ? state.modeGrantExpiresAt
          : 0;

      if(!modeAction || modeRemaining <= 0){
        modeAction = null;
        modeRemaining = 0;
        modeUsed = false;
        modeGrantExpiresAt = 0;
      }else if(!modeUsed){
        const remainingTime = modeGrantExpiresAt - Date.now();

        if(remainingTime > 0){
          modeTimer = setTimeout(() => {
            if(!modeUsed){
              clearModeGrant();
            }
          }, remainingTime);
        }else{
          modeAction = null;
          modeRemaining = 0;
          modeUsed = false;
          modeGrantExpiresAt = 0;
        }
      }
    }catch{
      try{
        localStorage.removeItem(STATE_KEY);
      }catch{}
    }finally{
      restoringState = false;
    }
  }

  function hasActiveInteractionState(){
    return (
      transformed ||
      armed ||
      readyOnce ||
      topReadyArmed ||
      buf.length > 0 ||
      !!modeAction
    );
  }

  function interruptRing(){
    if(ringNode){
      stop(ringNode);
      ringNode = null;
    }
  }

  function clearModeGrant(){
    modeAction = null;
    modeRemaining = 0;
    modeUsed = false;
    modeGrantExpiresAt = 0;

    if(modeTimer){
      clearTimeout(modeTimer);
      modeTimer = null;
    }

    saveState();
  }

  function grantMode(action, count){
    clearModeGrant();

    modeAction = action;
    modeRemaining = count;
    modeUsed = false;
    modeGrantExpiresAt = Date.now() + 8000;

    modeTimer = setTimeout(() => {
      if(!modeUsed){
        clearModeGrant();
      }
    }, 8000);

    saveState();
  }

  async function ensureReady(){
    await wakeAudio();

    if(!audioReady){
      await Promise.all(
        Object.keys(BASE).map(key => load(key).catch(() => null))
      );
      audioReady = true;
    }

    return await wakeAudio();
  }

  async function ensureActionAudio(){
    // 正常首次使用仍由 OPEN 或弹框按钮初始化。
    // 但如果是从后台进程恢复出的交互状态，则允许当前按钮自动重载音效。
    if(!audioReady && !hasActiveInteractionState()) return false;
    return await ensureReady();
  }

  async function onPower(){
    if(transformed) return;
    await ensureReady();
    play('openPhone');
  }

  async function onModeButton(){
    if(!await ensureActionAudio()) return;
    if(!transformed) return;
    if(!modeAction || modeRemaining <= 0) return;

    if(!modeUsed){
      modeUsed = true;
      if(modeTimer){
        clearTimeout(modeTimer);
        modeTimer = null;
      }
      modeGrantExpiresAt = 0;
      saveState();
    }

    if(modeAction === 'burst'){
      play('bmbiu');
    }else if(modeAction === 'single'){
      play('smbiu');
    }

    modeRemaining -= 1;
    if(modeRemaining <= 0){
      clearModeGrant();
    }else{
      saveState();
    }
  }

  function getDigitSound(k){
    if(k === '9') return 'key9';
    if(k === '1') return 'key1';
    if(k === '3') return 'key3';
    return 'key9';
  }

  async function pressDigit(k){
    if(!await ensureActionAudio()) return;
    interruptRing();
    buf = (buf + k).slice(-3);
    play(getDigitSound(k));
    saveState();
  }

  async function onEnter(){
    if(!await ensureActionAudio()) return;
    interruptRing();

    if(transformed){
      if(topReadyArmed){
        play('exceed');
        topReadyArmed = false;
        readyOnce = false;
        buf = '';
        saveState();
        return;
      }

      if(buf === '106'){
        play('enter');
        play('burstMode');
        grantMode('burst', 2);
        buf = '';
        saveState();
        return;
      }

      if(buf === '103'){
        play('enter');
        play('singleMode');
        grantMode('single', 3);
        buf = '';
        saveState();
        return;
      }

      if(!readyOnce){
        play('ready');
        readyOnce = true;
        saveState();
        return;
      }
      play('enter');
      play('exceed');
      readyOnce = false;
      saveState();
      return;
    }

    if(armed){
      stop(standNode);
      standNode = null;
      const s = play('complete');
      const done = () => {
        transformed = true;
        readyOnce = false;
        armed = false;
        buf = '';
        clearModeGrant();
        topReadyArmed = false;
        saveState();
      };
      if(s) s.onended = done;
      else setTimeout(done, 380);
      return;
    }

    play('enter');

    if(buf === TRANSFORM_CODE){
      stop(standNode);
      standNode = play('standBy');
      if(standNode) standNode.onended = () => standNode = null;
      armed = true;
      saveState();
      return;
    }

    if(buf.length === 3){
      play('error');
      buf = '';
      armed = false;
      readyOnce = false;
      saveState();
    }
  }

  async function onStar(){
    if(!await ensureActionAudio()) return;
    interruptRing();
    if(transformed) play('weaponHit');
    else play('key9');
    buf = (buf + '*').slice(-3);
    saveState();
  }

  async function ringStart(){
    if(!await ensureActionAudio()) return;
    interruptRing();
    ringNode = play('ring',{loop:true});
  }

  function ringStop(){
    if(!audioReady) return;
    interruptRing();
  }

  async function onClear(){
    if(!await ensureActionAudio()) return;
    interruptRing();

    if(!transformed){
      play('key9');
      buf = '';
      saveState();
      return;
    }

    play('key9');
    const s = play('release');
    const done = () => {
      transformed = false;
      armed = false;
      readyOnce = false;
      buf = '';
      clearModeGrant();
      topReadyArmed = false;
      saveState();
    };
    if(s) s.onended = done;
    else done();
  }

  function showExclusivePopup(id){
    ['popup1','popup2','popup3','popup4'].forEach(pid => {
      const el = document.getElementById(pid);
      if(pid === id){
        el.classList.toggle('show');
      }else{
        el.classList.remove('show');
      }
    });
  }

  document.getElementById('btnTop1').addEventListener('click', () => {
    showExclusivePopup('popup1');
  });

  document.getElementById('btnTop2').addEventListener('click', () => {
    showExclusivePopup('popup2');
  });

  document.getElementById('btnTop3').addEventListener('click', async () => {
    if(!transformed) return;

    await ensureReady();
    interruptRing();
    play('ready');
    topReadyArmed = true;
    readyOnce = false;
    buf = '';
  });

  document.getElementById('btnTop4').addEventListener('click', async () => {
    if(!transformed) return;

    await ensureReady();
    interruptRing();
    play('ready');
    topReadyArmed = true;
    readyOnce = false;
    buf = '';
  });

  document.getElementById('popup1-item1').addEventListener('click', async (e) => {
    e.stopPropagation();
    await ensureReady();
    play('smbiu');
  });

  document.getElementById('popup1-item2').addEventListener('click', async (e) => {
    e.stopPropagation();
    await ensureReady();

    if(popupBurstToggle === 0){
      play('burstMode');
      popupBurstToggle = 1;
    }else{
      play('bmbiu');
      popupBurstToggle = 0;
    }

    saveState();
  });

  document.getElementById('popup1-item3').addEventListener('click', async (e) => {
    e.stopPropagation();
    await ensureReady();
    play('ready');
  });

  document.getElementById('popup1-item4').addEventListener('click', async (e) => {
    e.stopPropagation();
    await ensureReady();
    play('exceed');
  });

  document.querySelectorAll('.hit[data-k]').forEach(b => {
    const k = b.dataset.k;
    if(k === '*') b.addEventListener('click', onStar);
    else b.addEventListener('click', () => pressDigit(k));
  });

  document.getElementById('btnEnter').addEventListener('click', onEnter);
  document.getElementById('btnRing').addEventListener('click', ringStart);
  document.getElementById('btnStop').addEventListener('click', ringStop);
  document.getElementById('btnClear').addEventListener('click', onClear);
  document.getElementById('btnPower').addEventListener('click', onPower);
  document.getElementById('btnMode').addEventListener('click', onModeButton);

  function getPct(name){
    return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name)) || 0;
  }

  function setRectByName(el, name){
    el.style.left   = getPct(`--btn-${name}-left`) + '%';
    el.style.top    = getPct(`--btn-${name}-top`) + '%';
    el.style.width  = getPct(`--btn-${name}-w`) + '%';
    el.style.height = getPct(`--btn-${name}-h`) + '%';
  }

  function setPopupRect(el, idx){
    el.style.left   = getPct(`--popup${idx}-left`) + '%';
    el.style.top    = getPct(`--popup${idx}-top`) + '%';
    el.style.width  = getPct(`--popup${idx}-w`) + '%';
    el.style.height = getPct(`--popup${idx}-h`) + '%';
  }

  function setPopupItemRect(el, idx){
    el.style.left   = getPct(`--popup1-img${idx}-left`) + '%';
    el.style.top    = getPct(`--popup1-img${idx}-top`) + '%';
    el.style.width  = getPct(`--popup1-img${idx}-w`) + '%';
    el.style.height = getPct(`--popup1-img${idx}-h`) + '%';
  }

  function place(){
    document.querySelectorAll('.hit[data-btn]').forEach(el => {
      setRectByName(el, el.dataset.btn);
    });

    setPopupRect(document.getElementById('popup1'), 1);
    setPopupRect(document.getElementById('popup2'), 2);
    setPopupRect(document.getElementById('popup3'), 3);
    setPopupRect(document.getElementById('popup4'), 4);

    setPopupItemRect(document.getElementById('popup1-item1'), 1);
    setPopupItemRect(document.getElementById('popup1-item2'), 2);
    setPopupItemRect(document.getElementById('popup1-item3'), 3);
    setPopupItemRect(document.getElementById('popup1-item4'), 4);
  }

  restoreState();

  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'visible'){
      wakeAudio();
    }else{
      saveState();
    }
  });

  window.addEventListener('pageshow', () => {
    wakeAudio();
  });

  window.addEventListener('focus', () => {
    wakeAudio();
  });

  window.addEventListener('pagehide', () => {
    saveState();
  });

  window.addEventListener('beforeunload', () => {
    saveState();
  });

  window.addEventListener('load', place);
  window.addEventListener('resize', place);
})();
</script>

<!-- ===== PWA Service Worker 注册与自动更新 ===== -->
<script>
(() => {
  if (!('serviceWorker' in navigator)) return;

  let reloading = false;

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloading) return;
    reloading = true;
    window.location.reload();
  });

  window.addEventListener('load', async () => {
    try {
      const registration = await navigator.serviceWorker.register('./sw.js', {
        scope: './',
        updateViaCache: 'none'
      });

      // 每次启动主动检查更新，不需要删除桌面 App 后重新添加。
      await registration.update();
    } catch (error) {
      console.warn('PWA Service Worker 注册失败：', error);
    }
  });
})();
</script>
